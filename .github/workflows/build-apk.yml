name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build APK (Docker)
        run: |
          docker run --rm \
            -v $(pwd):/home/user/hostcwd \
            kivy/buildozer:latest \
            android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ScaleDisplay-APK
          path: bin/*.apk
          if-no-files-found: error
          retention-days: 30
